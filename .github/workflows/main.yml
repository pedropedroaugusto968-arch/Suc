name: Compilar Suc Softwares Pro

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Restore
      run: msbuild -t:restore
    - name: Build
      run: msbuild SucSoftwares.csproj /p:Configuration=Release /p:Platform="Any CPU"
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Suc-Softwares-Final
        path: |
          **/*.exe
          **/*.dll
